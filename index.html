<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>

    <!-- The Heavyweight Drop Meta Tags -->
    <meta name="description"
        content="Enn Dub Productions. Creative Muse and Dynasty Architecture. Catch the vision in motion.">
    <meta property="og:title" content="Enn Dub Productions | Official Site">
    <meta property="og:description" content="Top Tier Lyricism. Visual Mastery. The Vault is Open. 253 Built.">
    <meta property="og:image" content="https://yourdomain.com/social-preview.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * {
            cursor: default;
        }

        body {
            margin: 0;
            background: #020202;
            /* Total darkness with a tiny bit of lifted black */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #333;
            /* Dark grey text */
            -webkit-user-select: none;
            /* No copying the blueprint */
            user-select: none;
        }

        /* The CCTV Scanline Overlay */
        body::after {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* The "Old Localized Broadcast" Grain/Noise Filter Overlay */
        body::before {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
            opacity: 0.05;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
        }

        /* The "Vault" Visual */
        .asset-container {
            position: relative;
            z-index: 1;
            perspective: 1200px;
            /* Gives the 3d coin tilt depth */
        }

        video {
            width: 65vw;
            max-width: 400px;
            /* Gritty finish: contrast pushed, sepia for age, some grayscale to chill the colors */
            filter: contrast(1.2) brightness(0.8) sepia(0.2) grayscale(0.5);
            animation: heavy-spin 15s linear infinite;
            /* Slight edge for tilt effect */
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            /* if it's not perfectly bound */
            transform-style: preserve-3d;
            box-shadow: 0 0 50px rgba(128, 128, 128, 0.1);
        }

        /* Heavy Spin - Added slight X-axis tilt like a 3D coin */
        @keyframes heavy-spin {
            0% {
                transform: rotateY(0deg) rotateX(10deg);
            }

            100% {
                transform: rotateY(360deg) rotateX(10deg);
            }
        }

        /* Terminal Data (Top Left) */
        .terminal {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 50;
        }

        /* Location Data (Bottom Right - Shifted up slightly to accommodate the Ghost Link) */
        .location {
            position: absolute;
            bottom: 40px;
            right: 20px;
            font-size: 10px;
            text-align: right;
            letter-spacing: 2px;
            z-index: 50;
        }

        .blink {
            animation: blinker 1.5s step-start infinite;
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }

        /* The Ghost Link - Hidden in plain sight */
        .the-line {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #111;
            /* Nearly invisible against the background */
            font-size: 10px;
            letter-spacing: 2px;
            transition: color 0.5s ease;
            z-index: 60;
        }

        .the-line:hover {
            color: #444;
            /* Only shows for the curious */
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="terminal">
        STATUS: <span class="blink">ENCRYPTED</span><br>
        UPLOADING_DYNASTY_PROTOCOL...<br>
        253_CONNECTED
    </div>

    <div class="asset-container">
        <!-- Connecting your existing video: enndubspincompass.mp4 -->
        <video autoplay loop muted playsinline>
            <source src="enndubspincompass.mp4" type="video/mp4">
        </video>
    </div>

    <div class="location">
        47.2529° N, 122.4443° W<br>
        ENN DUB PRODUCTIONS // <span id="session-id"></span>
    </div>

    <!-- The Silent Output -->
    <a href="mailto:contact@enndubproductions.com" class="the-line">ESTABLISHED</a>

    <script>
        // Generate a random "Session ID" to make it look official
        document.getElementById('session-id').innerText = Math.floor(100000 + Math.random() * 900000);
    </script>

</body>

</html>
